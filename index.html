<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf | Geliştirici Portalı</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; 
        }
        .header-section { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Sistem Durum Göstergesi */
        .status-bar { display: flex; justify-content: center; gap: 10px; align-items: center; margin-bottom: 20px; }
        .pulse { height: 10px; width: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 900px; }
        .card { 
            background: var(--card); padding: 30px; border-radius: 20px; text-decoration: none; color: white; 
            border: 1px solid #334155; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.5); }
        .card h2 { margin-top: 0; color: var(--primary); }
        .badge { font-size: 0.7rem; background: #334155; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="status-bar">
            <div class="pulse"></div>
            <span style="font-size: 0.9rem; color: #94a3b8;">Sistemler Çevrimiçi</span>
        </div>
        <h1>Yusuf'un Portalı</h1>
        <p style="color: #94a3b8;">Tekrar hoş geldin, Yusuf. Bugün ne inşa ediyoruz?</p>
    </div>
    
    <div class="grid">
        <a href="asistan.html" class="card">
            <span class="badge">AI Core</span>
            <h2>🤖 Akıllı Asistan</h2>
            <p>Sohbet et, hesapla ve yönet.</p>
        </a>
        
        <a href="tahmin.html" class="card">
            <span class="badge">Gaming</span>
            <h2>🎲 Pixel Tahmin</h2>
            <p>Zorluk seviyeli, can sistemli oyun modları.</p>
        </a>
    </div>

</body>
</html>
