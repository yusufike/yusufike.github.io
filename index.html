<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf AI Portalı</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        /* Tarih ve Saat Stili */
        #zaman-paneli { display: flex; justify-content: space-between; width: 100%; max-width: 400px; color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        h1 { color: #8b5cf6; margin-bottom: 30px; }
        .menu { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 400px; }
        button { 
            padding: 15px; width: 80%; margin: 10px auto; cursor: pointer; 
            border-radius: 12px; border: 1px solid #334155; 
            background: #1e293b; color: white; font-size: 16px; transition: 0.3s;
        }
        button:hover { background: #334155; border-color: #8b5cf6; }
        .asistan-btn { background: #7c3aed; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <div id="zaman-paneli">
        <div id="tarih"></div>
        <div id="saat"></div>
    </div>
    <h1>Yusuf AI Portalı</h1>
    <div class="menu">
        <a href="üstasis.html" style="text-decoration: none;">
            <button class="asistan-btn">Asistanı Başlat</button>
        </a>  
        <button onclick="alert('Sayı Tahmin Oyunu çok yakında!')">Sayı Tahmin Oyunu</button>
        <button onclick="alert('Hesap Makinesi yapım aşamasında!')">Hesap Makinesi</button>
        <button onclick="alert('Yusuf AI Portalı - 2026')">Hakkında</button>
    </div>
    <script>
        function guncelle() {
            let simdi = new Date();
            document.getElementById('tarih').innerText = simdi.toLocaleDateString('tr-TR');
            document.getElementById('saat').innerText = simdi.toLocaleTimeString('tr-TR');
        }
        setInterval(guncelle, 1000);
        guncelle();
    </script>
</body>
</html>
