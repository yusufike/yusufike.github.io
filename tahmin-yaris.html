<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tahmin Yarışı</title>
    <style>
        body { background: #222; color: white; text-align: center; font-family: sans-serif; }
        #yol { width: 500px; height: 60px; background: #444; margin: 20px auto; position: relative; border: 3px solid #fff; }
        #araba { width: 50px; height: 60px; background: red; position: absolute; left: 0; transition: 0.3s; }
    </style>
</head>
<body>
    <h1>Sayı Tahminle, Yarışı Kazan!</h1>
    <div id="yol"><div id="araba"></div></div>
    
    <input type="number" id="tahmin" placeholder="1-100 arası sayı">
    <button onclick="oyna()">Tahmin Et</button>
    <p id="mesaj"></p>

    <script>
        let hedefSayi = Math.floor(Math.random() * 100) + 1;
        let konum = 0;

        function oyna() {
            let tahmin = document.getElementById('tahmin').value;
            let araba = document.getElementById('araba');
            let mesaj = document.getElementById('mesaj');

            if (tahmin == hedefSayi) {
                konum += 45; // Araba 45 piksel ileri gider
                araba.style.left = konum + "px";
                mesaj.innerText = "Doğru tahmin! Araba ileri fırladı!";
                hedefSayi = Math.floor(Math.random() * 100) + 1; // Yeni sayı belirle
            } else {
                mesaj.innerText = (tahmin < hedefSayi) ? "Daha büyük bir sayı gir!" : "Daha küçük bir sayı gir!";
            }
            if (konum >= 450) mesaj.innerText = "Yarışı kazandın! Tebrikler!";
        }
    </script>
</body>
</html>
