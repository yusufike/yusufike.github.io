<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tarih & Coğrafya Uzmanı</title>
    <style>
        body { background-color: #2c3e50; color: white; padding: 20px; font-family: sans-serif; }
        #cevap { margin-top: 20px; padding: 15px; border-radius: 10px; background-color: #34495e; min-height: 50px; }
    </style>
</head>
<body>
    <h2>🌍 Tarih ve Coğrafya Portalı</h2>
    <input type="text" id="soru" placeholder="Tarih veya Coğrafya sorunu yaz..." style="width: 80%; padding: 10px;">
    <button onclick="sor()">Cevabı Bul</button>
    <div id="cevap">Soru bekliyorum...</div>
    <script>
        async function sor() {
            const API_KEY = "AQ.Ab8RN6Iy5ksk2M0LgfFVGdrp14Aw4RGFerNWw4QUzHtNwJYn8A";
            let metin = document.getElementById('soru').value;
            let cevap = document.getElementById('cevap');
            // Asistanın her iki alanda da uzman olmasını sağlayan talimat
            let sistemTalimati = "Sen hem uzman bir tarihçi hem de uzman bir coğrafyacısın. " +
                                "Sana sorulan konu tarihe mi yoksa coğrafyaya mı ait analiz et " +
                                "ve o alanın terminolojisini kullanarak derinlemesine, akademik bir cevap ver.";
            cevap.innerText = "Analiz ediliyor...";

            try {
                let res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: sistemTalimati + " Soru: " + metin }] }] })
                });
                let data = await res.json();
                cevap.innerText = data.candidates[0].content.parts[0].text;
            } catch(e) {
                cevap.innerText = "Hata oluştu: " + e.message;
            }
        }
    </script>
</body>
</html>
