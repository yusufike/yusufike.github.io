<!DOCTYPE html>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #8b5cf6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; margin-bottom: 15px; background: #334155; color: white; box-sizing: border-box; }
        #ekran { background: #0f172a; padding: 20px; border-radius: 12px; min-height: 250px; border: 1px solid #475569; }
        h3 { color: var(--accent); }
    </style>
</head>

    { anahtar: ["mısır"], bilgi: "Mısır: Piramitler ve kadim tarih." }

function asistan(e) {
    if (e.key !== 'Enter') return;
    let girdi = document.getElementById('komut').value.toLowerCase();
    let ekran = document.getElementById('ekran');    
    if (girdi.includes("merhaba") || girdi.includes("selam")) {
        ekran.innerHTML = "Merhaba! Tarihi sorular sormanı bekliyorum. İstediğin padişahı veya savaşı yazıp Enter'a basabilirsin.";
        return;
    }
    let bul = veriler.find(item => item.anahtar.some(a => girdi.includes(a)));
    ekran.innerHTML = bul ? `<h3>Sonuç bulundu:</h3><p>${bul.bilgi}</p>` : "Üzgünüm, bu bilgiyi henüz veritabanına eklemedim. Başka bir isim veya savaş dene.";
}
</script>
</body>
</html>
