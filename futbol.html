<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profesyonel Futbol Simülasyonu</title>
    <style>
        body { background: #2e7d32; color: #fff; font-family: sans-serif; text-align: center; }
        #saha { width: 300px; height: 400px; border: 4px solid white; margin: 20px auto; position: relative; background: #4caf50; overflow: hidden; }
        #top { 
            width: 40px; height: 40px; 
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Soccer_ball.svg/1024px-Soccer_ball.svg.png'); 
            background-size: cover; border-radius: 50%; position: absolute; bottom: 10px; left: 130px; transition: 0.5s; 
        }
        #kaleci { width: 50px; height: 20px; background: red; position: absolute; top: 50px; left: 125px; transition: 0.3s; }
        #guc-cubugu { width: 200px; height: 20px; border: 2px solid #fff; margin: 10px auto; background: linear-gradient(to right, green, yellow, red); }
        #guc-imlec { width: 5px; height: 20px; background: black; position: relative; left: 0px; }
    </style>
</head>
<body>
    <h1>Euro League Şut Modu</h1>
    <div id="saha">
        <div id="kaleci"></div>
        <div id="top"></div>
    </div>
    <div id="guc-cubugu"><div id="guc-imlec"></div></div>
    <button onclick="sutCek()">ŞUT ÇEK! ⚽</button>
    <p id="durum">Gücü ayarla ve şut çek!</p>

    <script>
        let imlecPoz = 0; let yon = 1;
        setInterval(() => {
            imlecPoz += yon * 5;
            if (imlecPoz > 195 || imlecPoz < 0) yon *= -1;
            document.getElementById('guc-imlec').style.left = imlecPoz + "px";
        }, 50);

        function sutCek() {
            let guc = imlecPoz;
            let top = document.getElementById('top');
            let kaleci = document.getElementById('kaleci');
            let kaleciKonum = Math.floor(Math.random() * 250);
            kaleci.style.left = kaleciKonum + "px";
            
            top.style.bottom = "350px";
            top.style.left = (Math.random() * 260) + "px";
            
            setTimeout(() => {
                if (guc > 100 && Math.abs(parseInt(top.style.left) - kaleciKonum) > 50) {
                    document.getElementById('durum').innerText = "GOL! İnanılmaz bir şut!";
                } else {
                    document.getElementById('durum').innerText = "Kaleci kurtardı veya dışarı çıktı!";
                }
                top.style.bottom = "10px"; top.style.left = "130px";
            }, 600);
        }
    </script>
</body>
</html>
