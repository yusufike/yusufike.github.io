<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf AI | Üst Düzey Asistan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #8b5cf6; }
        textarea { width: 100%; height: 120px; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 12px; padding: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #8b5cf6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #cevap { margin-top: 20px; padding: 20px; background: #1e293b; border-radius: 12px; border-left: 5px solid #8b5cf6; min-height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Yusuf AI | Üst Düzey Uzman</h2>
        <textarea id="soru" placeholder="Tarih, Coğrafya veya Matematik sorunu sor..."></textarea>
        <button onclick="sor()">Analiz Et</button>
        <div id="cevap">Sistem hazır, sorunu bekliyorum...</div>
    </div>
    <script>
        const k = "gsk_";
        const a = "F0ECbLssWZEyViCdujGoWGdyb3FYDgljafO6lYtpy1pe4uZ6Zz65";
        const API_KEY = k + a;
        async function sor() {
            let metin = document.getElementById('soru').value;
            let cevap = document.getElementById('cevap');
            if (!metin) return alert("Soru alanı boş!");
            cevap.innerHTML = "<i>Akademik veri tabanları taranıyor...</i>";
            try {
                let res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-70b-8192",
                        messages: [
                            { role: "system", content: "Sen Yusuf AI'sın. Üst düzey bir akademik asistansın. Tarih, Coğrafya ve Matematik konusunda uzmansın. Eğer bir soru hakkında bilgin kesin değilse veya cevaptan emin değilsen, asla uydurma. 'Bu konuda yeterli akademik bilgiye sahip değilim, lütfen başka bir soru sorar mısın?' şeklinde nazikçe yanıt ver. Cevaplarını her zaman net, doğru ve açıklayıcı tut." },
                            { role: "user", content: metin }
                        ]
                    })
                });
                let data = await res.json();
                cevap.innerText = data.choices[0].message.content;
            } catch(e) {
                cevap.innerText = "Sistem şu an meşgul, lütfen tekrar dene.";
            }
        }
    </script>
</body>
</html>
