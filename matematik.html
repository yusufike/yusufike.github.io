<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf'un Asistanı</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .input-container { background: #222; border-radius: 30px; padding: 15px; width: 80%; max-width: 400px; display: flex; align-items: center; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; font-size: 18px; }
        #cevap { margin-top: 20px; font-size: 20px; color: #00d4ff; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <h1 id="karsilama"></h1>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Matematik veya bilgi sor..." onkeypress="handleEnter(event)">
    </div>
    <div id="cevap"></div>

    <script>
        // İsim karşılama
        let isim = localStorage.getItem('kullaniciIsmi');
        document.getElementById('karsilama').innerText = "Hoş geldin, " + (isim ? isim : "Yusuf");

        function handleEnter(e) {
            if (e.key === 'Enter') {
                let giris = document.getElementById('userInput').value.toLowerCase();
                let cevapDiv = document.getElementById('cevap');
                
                // Matematik İşlemi
                if (giris.includes("+") || giris.includes("*") || giris.includes("-")) {
                    let sonuc;
                    if (giris.includes("+")) {
                        let sayilar = giris.split("+");
                        sonuc = parseFloat(sayilar[0]) + parseFloat(sayilar[1]);
                        cevapDiv.innerHTML = "Cevabı buldum: " + sonuc + ". Başka sorun var mı, " + (isim ? isim : "Yusuf") + "?";
                    } 
                    else if (giris.includes("*")) {
                        let sayilar = giris.split("*");
                        sonuc = parseFloat(sayilar[0]) * parseFloat(sayilar[1]);
                        cevapDiv.innerHTML = "Cevabı buldum: " + sonuc + ". Başka sorun var mı, " + (isim ? isim : "Yusuf") + "?";
                    }
                    else if (giris.includes("-")) {
                        let sayilar = giris.split("-");
                        sonuc = parseFloat(sayilar[0]) - parseFloat(sayilar[1]);
                        cevapDiv.innerHTML = "Cevabı buldum: " + sonuc + ". Başka sorun var mı, " + (isim ? isim : "Yusuf") + "?";
                    }
                } else {
                    cevapDiv.innerHTML = "Bunu henüz bilmiyorum, öğretmemi ister misin?";
                }
            }
        }
    </script>
</body>
</html>
