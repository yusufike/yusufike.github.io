<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İleri Matematik Modülü</title>
    <style>
        body { background: #0a0a0c; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #15151b; border: 2px solid #332d4a; border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #fff; margin-bottom: 20px; text-align: center; }
        .back-btn { color: #8e8e9e; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 20px; }
        
        /* Modern Input Alanı */
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #22222d; color: white; box-sizing: border-box; font-size: 16px; }
        
        /* Modern Buton */
        .mor-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #7c3aed; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .mor-btn:hover { background: #6d28d9; transform: scale(1.02); }
        
        .cevap-alani { background: #1a1a23; padding: 20px; border-radius: 12px; margin-top: 20px; color: #38bdf8; font-weight: bold; text-align: center; font-size: 18px; border: 1px solid #332d4a; }
    </style>
</head>
<body>

    <div class="container">
        <a href="asistan.html" class="back-btn">← Asistana Dön</a>
        <h2>İleri Matematik</h2>
        
        <input type="text" id="islemInput" placeholder="Örn: 5 x 5 veya 100 / 2">
        <button class="mor-btn" onclick="hesapla()">Hesapla</button>
        
        <div class="cevap-alani" id="matCevap">Sonuç bekleniyor...</div>
    </div>

    <script>
        function hesapla() {
            let girdi = document.getElementById('islemInput').value;
            let cevapAlani = document.getElementById('matCevap');
            
            try {
                // "x" veya "×" işaretini kodun anlayacağı "*" işaretine çevir
                let temizGirdi = girdi.replace(/x/gi, '*').replace(/×/g, '*');
                
                // İşlemi yap
                let sonuc = eval(temizGirdi);
                
                if (sonuc === undefined || isNaN(sonuc)) {
                    cevapAlani.innerText = "Lütfen geçerli bir işlem gir.";
                } else {
                    cevapAlani.innerText = "Sonuç: " + sonuc;
                }
            } catch (e) {
                cevapAlani.innerText = "Hata: İşlemi kontrol et.";
            }
        }
    </script>
</body>
</html>
