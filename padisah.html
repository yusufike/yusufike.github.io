<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tarih Ansiklopedisi Pro</title>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 20px; }
        .search-box { padding: 12px; width: 100%; border-radius: 8px; border: none; margin-bottom: 10px; }
        .menu { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 15px; cursor: pointer; background: #4f46e5; color: white; border: none; border-radius: 6px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .kart { background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #fbbf24; }
        h3 { color: #fbbf24; margin-top: 0; }
        .badge { font-size: 11px; background: #334155; padding: 2px 6px; border-radius: 4px; color: #cbd5e1; }
    </style>
</head>
<body>

    <h2>📜 Tarih Ansiklopedisi Pro</h2>
    
    <div class="controls">
        <input type="text" id="arama" class="search-box" placeholder="Padişah, Savaş veya Kahraman ara..." onkeyup="filtrele('arama')">
        <div class="menu">
            <button onclick="filtrele('Padişah')">👑 Padişahlar</button>
            <button onclick="filtrele('Savaş')">⚔️ Savaşlar</button>
            <button onclick="filtrele('Kahraman')">🏆 Kahramanlar</button>
            <button onclick="filtrele('all')">Tümü</button>
        </div>
    </div>

    <div class="grid" id="liste"></div>

    <script>
        const veriTabani = [
            { kategori: "Padişah", ad: "Fatih Sultan Mehmet", detay: "İstanbul'u fethetti. Bizans'ı yıktı. Orta Çağ'ı kapatıp Yeni Çağ'ı açtı." },
            { kategori: "Padişah", ad: "Kanuni Sultan Süleyman", detay: "En geniş sınırlara ulaşıldı. Hukuk reformları yapıldı." },
            { kategori: "Savaş", ad: "Malazgirt Meydan Muharebesi", detay: "Neden: Bizans baskısı. Sonuç: Anadolu'nun kapıları Türklere açıldı." },
            { kategori: "Savaş", ad: "Çanakkale Savaşı", detay: "Neden: İtilaf işgali. Sonuç: Vatan savunması zaferle sonuçlandı." },
            { kategori: "Kahraman", ad: "Seyit Onbaşı", detay: "Hayatı: Çanakkale'de 215 kg'lık mermiyi tek başına topa sürerek zırhlıyı batırdı." },
            { kategori: "Kahraman", ad: "Alparslan", detay: "Hayatı: Selçuklu Sultanı. Malazgirt zaferiyle Türk tarihini değiştirdi." }
        ];

        function goster(veri) {
            document.getElementById('liste').innerHTML = veri.map(v => `
                <div class="kart">
                    <span class="badge">${v.kategori}</span>
                    <h3>${v.ad}</h3>
                    <p>${v.detay}</p>
                </div>
            `).join('');
        }

        function filtrele(kriter) {
            let sonuc;
            if(kriter === 'all') {
                sonuc = veriTabani;
            } else if(kriter === 'arama') {
                let girdi = document.getElementById('arama').value.toLowerCase();
                sonuc = veriTabani.filter(v => v.ad.toLowerCase().includes(girdi) || v.detay.toLowerCase().includes(girdi));
            } else {
                sonuc = veriTabani.filter(v => v.kategori === kriter);
            }
            goster(sonuc);
        }

        goster(veriTabani);
    </script>
</body>
</html>
