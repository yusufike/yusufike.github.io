<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohbet Paneli</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #sohbetEkranı { width: 90%; max-width: 500px; height: 400px; background: #1e293b; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #334155; }
        .input-alanı { width: 90%; max-width: 500px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #334155; color: white; outline: none; }
        button { padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #6366f1; }
    </style>
</head>
<body>

    <div id="sohbetEkranı"></div>

    <div class="input-alanı">
        <input type="text" id="mesajGirdisi" placeholder="Mesajını yaz...">
        <button onclick="gonder()">Gönder</button>
    </div>

    <script>
        function gonder() {
            let girdi = document.getElementById('mesajGirdisi');
            let ekran = document.getElementById('sohbetEkranı');
            let msg = girdi.value.toLowerCase();
            
            if (girdi.value.trim() !== "") {
                // Sen yazdığın sürece burası çalışır
                ekran.innerHTML += "<p><b>Sen:</b> " + girdi.value + "</p>";
                
                // HİYERARŞİK KONTROL
                if (msg.includes("kötü") || msg.includes("idare eder") || msg.includes("sorun var")) {
                    ekran.innerHTML += "<p><b>Asistan:</b> Kötü olmuş, noldu? Bir sorun mu var, anlatabilirsin...</p>";
                }
                else if (msg.includes("iyi") || msg.includes("güzel") || msg.includes("çok iyi")) {
                    ekran.innerHTML += "<p><b>Asistan:</b> Senin adına çok sevindim, yapabileceğim bir şey var mı?</p>";
                }
                else if (msg.includes("selam") || msg.includes("merhaba")) {
                    ekran.innerHTML += "<p><b>Asistan:</b> Merhaba! Günün nasıl geçiyor?</p>";
                }
                else if (msg.includes("matematik")) {
                    ekran.innerHTML += "<p><b>Asistan:</b> Matematik soruları için matematik bölümüne bakabilirsin.</p>";
                }
                else if (msg.includes("coğrafya") || msg.includes("cografya")) {
                    ekran.innerHTML += "<p><b>Asistan:</b> Coğrafya soruları için ilgili bölümü kontrol edebilirsin.</p>";
                }
                else if (msg.includes("fatih sultan mehmet")) {
                    ekran.innerHTML += "<p><b>Asistan:</b> Fatih Sultan Mehmet ile ilgili bilgileri Coğrafya/Tarih bölümünden öğrenebilirsin.</p>";
                }
                else {
                    ekran.innerHTML += "<p><b>Asistan:</b> Henüz yapım aşamasındayım. Geliştiricim Yusuf'a (TikTok: neoxi31) ulaşarak bana yeni özellikler eklemesini sağlayabilirsin.</p>";
                }
                
                girdi.value = ""; // Kutuyu temizle
                ekran.scrollTop = ekran.scrollHeight; // En aşağı kaydır
            }
        }
    </script>
</body>
</html>
