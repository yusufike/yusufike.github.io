<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf'un Asistanı</title>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 100%; max-width: 400px; height: 350px; border: 1px solid #444; overflow-y: scroll; padding: 15px; background: #252525; border-radius: 15px; margin-bottom: 10px; }
        input { width: 75%; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; }
        button { padding: 12px 20px; background: #4caf50; border: none; border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Asistanınla Konuş</h2>
    <div id="chat-box"></div>
    <div>
        <input type="text" id="userInput" placeholder="Bir şeyler yaz...">
        <button onclick="cevapVer()">Gönder</button>
    </div>

    <script>
        function cevapVer() {
            let input = document.getElementById('userInput').value.toLowerCase();
            let chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += "<p><b>Sen:</b> " + document.getElementById('userInput').value + "</p>";
            
            let cevap = "Hmm, bu konu üzerinde biraz düşünmem lazım! Oyunlarımızı mı geliştirsek ne dersin?";
            
            // Buraya "senin gibi" cevaplar ekleyelim
            if (input.includes("merhaba") || input.includes("selam")) cevap = "Selam Yusuf! Yine kodlama günü, harika gidiyorsun.";
            else if (input.includes("futbol")) cevap = "Futbol simülasyonu bende! Kaleciyi biraz daha zıplatalım mı, ne dersin?";
            else if (input.includes("yarış")) cevap = "Yarış oyunu tıkır tıkır çalışıyor, biraz hız mı eklesek?";
            else if (input.includes("kod")) cevap = "Kodlamak bazen kafa karıştırıcı olabilir ama beraber çözeriz, hallederiz!";
            
            chatBox.innerHTML += "<p><b>Asistan:</b> " + cevap + "</p>";
            chatBox.scrollTop = chatBox.scrollHeight;
            document.getElementById('userInput').value = "";
        }
    </script>
</body>
</html>
