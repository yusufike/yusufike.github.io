<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf'un Asistanı</title>
</head>
<body>
    <h1 id="karsilama">Merhaba Yusuf, bugün ne konuşalım?</h1>
    <input type="text" id="userInput" placeholder="Bir şeyler yaz..." onkeypress="handleEnter(event)">
    <div id="cevap"></div>

    <script>
        function handleEnter(e) {
            if (e.key === 'Enter') {
                let giris = document.getElementById('userInput').value.toLowerCase();
                let cevapDiv = document.getElementById('cevap');
                let cevap = "";

                // 1. Sohbet Kısmı
                if (giris.includes("merhaba") || giris.includes("selam")) {
                    cevap = "Selam Yusuf! Bugün projelerini geliştirmek için buradayım.";
                } else if (giris.includes("nasılsın")) {
                    cevap = "Kodlarım kusursuz çalışıyor, harika hissediyorum!";
                } 
                // 2. Matematik Kısmı (Eğer sohbet değilse buraya bakar)
                else if (giris.includes("+")) {
                    let s = giris.split("+");
                    cevap = "Sonuç: " + (parseFloat(s[0]) + parseFloat(s[1]));
                } else if (giris.includes("*")) {
                    let s = giris.split("*");
                    cevap = "Sonuç: " + (parseFloat(s[0]) * parseFloat(s[1]));
                } 
                // 3. Bilinmeyen Durum
                else {
                    cevap = "Bu konuyu henüz öğrenmedim ama oyunlarımız hakkında konuşabiliriz.";
                }

                cevapDiv.innerText = cevap;
                document.getElementById('userInput').value = "";
            }
        }
    </script>
</body>
</html>
