<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Asistan Paneli</title>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; height: 100vh; margin: 0; }
        #sohbetEkranı { width: 100%; max-width: 500px; flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Mesaj Balonları */
        .mesaj { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .sen { align-self: flex-end; background: #4f46e5; color: white; border-bottom-right-radius: 2px; }
        .asistan { align-self: flex-start; background: #334155; color: #e2e8f0; border-bottom-left-radius: 2px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-alanı { width: 100%; max-width: 500px; display: flex; gap: 8px; background: #1e293b; padding: 10px; border-radius: 50px; }
        input { flex: 1; border: none; background: transparent; color: white; padding: 10px; outline: none; }
        button { border: none; padding: 10px 18px; border-radius: 50px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-gonder { background: #4f46e5; }
        .btn-ses { background: #ef4444; }
    </style>
</head>
<body>

    <div id="sohbetEkranı"></div>

    <div class="input-alanı">
        <input type="text" id="mesajGirdisi" placeholder="Bir şeyler yaz veya sor...">
        <button class="btn-gonder" onclick="gonder()">➤</button>
        <button class="btn-ses" onclick="sesleDinle()">🎤</button>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';

        function sesleDinle() {
            recognition.start();
            document.getElementById('mesajGirdisi').placeholder = "Dinliyorum...";
        }

        recognition.onresult = (event) => {
            document.getElementById('mesajGirdisi').value = event.results[0][0].transcript;
            document.getElementById('mesajGirdisi').placeholder = "Bir şeyler yaz veya sor...";
            gonder();
        };

        function gonder() {
            let girdi = document.getElementById('mesajGirdisi');
            let ekran = document.getElementById('sohbetEkranı');
            let msg = girdi.value.toLowerCase();
            
            if (girdi.value.trim() !== "") {
                ekran.innerHTML += `<div class="mesaj sen">${girdi.value}</div>`;
                
                // Akıcı Yanıt Sistemi
                setTimeout(() => {
                    let yanit = "";
                    if (msg.includes("kötü") || msg.includes("idare eder") || msg.includes("sorun")) yanit = "Kötü olmuş, noldu? Bir sorun mu var, anlatabilirsin...";
                    else if (msg.includes("iyi") || msg.includes("harika")) yanit = "Senin adına çok sevindim, yapabileceğim bir şey var mı?";
                    else if (msg.includes("selam") || msg.includes("merhaba")) yanit = "Merhaba! Günün nasıl geçiyor?";
                    else if (msg.includes("matematik")) yanit = "Matematik soruları için matematik bölümüne bakabilirsin.";
                    else if (msg.includes("coğrafya")) yanit = "Coğrafya soruları için ilgili bölümü kontrol edebilirsin.";
                    else if (msg.includes("fatih sultan mehmet")) yanit = "Fatih Sultan Mehmet, İstanbul'u fetheden büyük bir padişahtır.";
                    else yanit = "Henüz yapım aşamasındayım. Geliştiricim Yusuf'a (TikTok: neoxi31) ulaşarak bana yeni özellikler ekletebilirsin.";
                    
                    ekran.innerHTML += `<div class="mesaj asistan">${yanit}</div>`;
                    ekran.scrollTop = ekran.scrollHeight;
                }, 500); // 0.5 saniyelik doğal gecikme
                
                girdi.value = "";
            }
        }
    </script>
</body>
</html>
