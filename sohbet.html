<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf'un Asistanı</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 100%; max-width: 500px; height: 350px; border: 1px solid #333; overflow-y: scroll; padding: 15px; background: #1e1e1e; border-radius: 10px; margin-bottom: 10px; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px; background: #4caf50; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Yusuf'un Yapay Zekası</h2>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="Bir şey sor...">
    <button onclick="cevapVer()">Gönder</button>

    <script>
        function cevapVer() {
            let input = document.getElementById('userInput').value.toLowerCase();
            let chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += "<p><b>Sen:</b> " + document.getElementById('userInput').value + "</p>";
            
            // İşte sır: Matematik kelimesini yasakladık!
            let cevap = "Bu konuyu henüz öğrenmedim ama oyunların hakkında konuşmaya bayılırım! Futbol oyunundaki şut mekaniğini geliştirelim mi?";
            
            if (input.includes("merhaba") || input.includes("selam")) cevap = "Selam Yusuf! Bugün kodlama dünyasında neler yapıyoruz?";
            else if (input.includes("nasılsın")) cevap = "Sistemlerim tamamen senin projelerine odaklı, gayet iyiyim! Sen nasılsın?";
            else if (input.includes("futbol")) cevap = "Futbol simülasyonu süper gidiyor. Kaleciyi daha zeki yapmamı ister misin?";
            else if (input.includes("oyun")) cevap = "Oyun dünyası harika! Yarış mı, futbol mu, yoksa yeni bir fikir mi?";

            chatBox.innerHTML += "<p><b>Asistan:</b> " + cevap + "</p>";
            document.getElementById('userInput').value = "";
        }
    </script>
</body>
</html>
