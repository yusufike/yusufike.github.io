<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pixel Tahmin Oyunu</title>
    <style>
        body { background: #1e1e2e; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #oyunAlani { width: 90%; max-width: 400px; background: #2a2a3c; padding: 20px; border: 4px solid #444; border-radius: 10px; text-align: center; }
        #canBar { position: absolute; top: 10px; left: 10px; font-size: 24px; }
        #skorBar { position: absolute; top: 10px; right: 10px; font-weight: bold; color: #fbbf24; font-size: 20px; }
        .btn { padding: 10px 15px; margin: 5px; cursor: pointer; background: #4f46e5; border: none; color: white; font-weight: bold; }
        .ipucu-btn { background: #10b981; }
    </style>
</head>
<body>

    <div id="canBar"></div>
    <div id="skorBar">Doğru: 0</div>

    <div id="oyunAlani">
        <h2>PİXEL TAHMİN</h2>
        <div id="menu">
            <button class="btn" onclick="oyunBaslat(1)">KOLAY (1-10)</button>
            <button class="btn" onclick="oyunBaslat(2)">NORMAL (1-20)</button>
            <button class="btn" onclick="oyunBaslat(3)">ZOR (1-25)</button>
        </div>
        <div id="oyunEkranı" style="display:none;">
            <p id="bilgi">Seviye seçildi, tahminini gir!</p>
            <input type="number" id="tahmin" style="width:60px; padding:5px;">
            <button class="btn" onclick="kontrolEt()">Tahmin Et</button>
            <div id="ipucuAlani" style="margin-top:15px;"></div>
        </div>
    </div>

    <script>
        let hedef, can, skor = 0, mod, ipucuHak;

        function oyunBaslat(m) {
            mod = m;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('oyunEkranı').style.display = 'block';
            
            if(mod === 1) { hedef = Math.floor(Math.random()*10)+1; can = 0; }
            else if(mod === 2) { hedef = Math.floor(Math.random()*20)+1; can = 3; ipucuHak = 3; }
            else { hedef = Math.floor(Math.random()*25)+1; can = 5; ipucuHak = 5; }
            ekranGuncelle();
        }

        function ekranGuncelle() {
            document.getElementById('canBar').innerHTML = (mod === 1) ? "" : "❤️".repeat(can);
        }

        function kontrolEt() {
            let t = parseInt(document.getElementById('tahmin').value);
            if(t === hedef) {
                skor++;
                document.getElementById('skorBar').innerHTML = "Doğru: " + skor;
                alert("Tebrikler! Yeni sayıya geçiliyor.");
                oyunBaslat(mod);
            } else {
                if(mod !== 1) can--;
                ekranGuncelle();
                if(can <= 0 && mod !== 1) { alert("OYUN BİTTİ! Sayı: " + hedef); location.reload(); }
                document.getElementById('bilgi').innerHTML = (t < hedef) ? "Daha Büyük!" : "Daha Küçük!";
                
                // Zor modda ipucu menüsünü tetikle
                if(mod === 3 && ipucuHak > 0) {
                    document.getElementById('ipucuAlani').innerHTML = 
                    `<button class="ipucu-btn" onclick="ipucuVer(1)">Büyük/Küçük</button>
                     <button class="ipucu-btn" onclick="ipucuVer(2)">Yakınlık</button>
                     <button class="ipucu-btn" onclick="ipucuVer(3)">Tek/Çift</button>`;
                }
            }
        }

        function ipucuVer(tip) {
            ipucuHak--;
            if(tip === 1) alert(hedef > 12 ? "Sayı 12'den büyük" : "Sayı 12'den küçük");
            if(tip === 2) alert("Sayı " + (hedef-1) + " ile " + (hedef+1) + " arasında");
            if(tip === 3) alert(hedef % 2 === 0 ? "Sayı ÇİFT" : "Sayı TEK");
        }
    </script>
</body>
</html>
