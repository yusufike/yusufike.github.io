<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sayı Tahmin Oyunu</title>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 50px; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #e91e63; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Sayı Tahmin Oyunu</h1>
    <p>1 ile 100 arasında bir sayı tuttum. 5 hakkın var!</p>
    <input type="number" id="tahmin" placeholder="Tahminin...">
    <button onclick="kontrol()">Tahmin Et</button>
    <p id="sonuc"></p>
    <p>Kalan Can: <span id="can">5</span></p>

    <script>
        let sayi = Math.floor(Math.random() * 100) + 1;
        let can = 5;

        function kontrol() {
            let tahmin = document.getElementById('tahmin').value;
            let sonuc = document.getElementById('sonuc');
            let canGosterge = document.getElementById('can');

            if (can > 0) {
                if (tahmin == sayi) {
                    sonuc.innerText = "Tebrikler! Bildin!";
                    sonuc.style.color = "green";
                } else {
                    can--;
                    canGosterge.innerText = can;
                    if (can == 0) {
                        sonuc.innerText = "Hakkın bitti! Sayı: " + sayi;
                    } else {
                        sonuc.innerText = (tahmin < sayi) ? "Daha BÜYÜK bir sayı gir." : "Daha KÜÇÜK bir sayı gir.";
                    }
                }
            }
        }
    </script>
</body>
</html>
