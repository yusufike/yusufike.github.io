<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><title>Sayı Tahmini</title></head>
<body>
    <h1>Sayı Tahmin Oyunu</h1>
    <input type="number" id="tahmin" placeholder="1-100 arası">
    <button onclick="kontrol()">Tahmin Et</button>
    <p id="sonuc"></p>
    <script>
        let sayi = Math.floor(Math.random() * 100) + 1;
        function kontrol() {
            let t = document.getElementById('tahmin').value;
            let s = document.getElementById('sonuc');
            if(t == sayi) s.innerText = "Tebrikler! Doğru tahmin.";
            else if(t < sayi) s.innerText = "Daha büyük bir sayı gir.";
            else s.innerText = "Daha küçük bir sayı gir.";
        }
    </script>
</body>
</html>
