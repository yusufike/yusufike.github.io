<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf Asistan Giriş</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { font-weight: 300; margin-bottom: 30px; }
        .input-box { background: #1a1a1a; padding: 20px; border-radius: 25px; width: 80%; max-width: 400px; display: flex; }
        input { background: none; border: none; color: white; width: 100%; font-size: 18px; outline: none; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Ne sormak istersin, Yusuf?</h1>
    <div class="input-box">
        <input type="text" id="isimInput" placeholder="Adın nedir?">
        <button onclick="kaydet()">Giriş</button>
    </div>
    <script>
        function kaydet() {
            let isim = document.getElementById('isimInput').value;
            if(isim) {
                localStorage.setItem('kullaniciIsmi', isim);
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
