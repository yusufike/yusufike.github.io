<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf'un Portalı</title>
    <style>
        :root { --bg: #0a0a0c; --card: #15151b; --primary: #6366f1; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        
        /* Sistem Durumu */
        .status { margin-bottom: 30px; font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 8px; }
        .dot { height: 8px; width: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 600px; }
        
        .card { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            border: 1px solid #333; transition: 0.3s; text-decoration: none; color: white; text-align: center;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        h2 { margin: 0; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="status">
        <div class="dot"></div> Sistemler Çevrimiçi
    </div>

    <h1>Yusuf'un Portalı</h1>

    <div class="menu-grid">
        <a href="asistan.html" class="card">🤖 Asistan</a>
        <a href="tahmin.html" class="card">🎲 Oyun Merkezi</a>
    </div>

</body>
</html>
