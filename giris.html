<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hoş Geldin</title>
    <style>
        body { background: linear-gradient(135deg, #000, #333); color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial; margin: 0; }
        input { padding: 15px; border-radius: 20px; border: none; width: 250px; text-align: center; font-size: 1.2em; }
        .btn { margin-top: 20px; background: #00d4ff; color: black; padding: 15px 30px; border-radius: 50px; border: none; cursor: pointer; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1 id="baslik">Hoş geldin kullanıcı!</h1>
    <input type="text" id="isimInput" placeholder="İsmin ne?">
    <button class="btn" onclick="kaydet()">Kaydet ve Giriş Yap</button>

    <script>
        function kaydet() {
            let isim = document.getElementById('isimInput').value;
            if(isim) {
                localStorage.setItem('kullaniciIsmi', isim);
                window.location.href = 'index.html';
            } else {
                alert("Lütfen ismini gir!");
            }
        }
    </script>
</body>
</html>
