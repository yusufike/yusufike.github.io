<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf | Portal v1.0</title>
    <style>
        :root { 
            --bg: #0a0a0c; 
            --glass: rgba(255, 255, 255, 0.05); 
            --primary: #6366f1; 
        }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px; 
            min-height: 100vh; 
            margin: 0; 
        }
        h1 { margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 30px; 
            border-radius: 25px; 
            transition: 0.4s; 
            text-decoration: none; 
            color: white; 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary); 
            background: rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body>

    <h1>Yusuf'un Portalı</h1>
    <p>Sistemler hazır, seçimini yap.</p>

    <a href="asistan.html" class="card">
        <h2>🤖 Yapay Zeka Asistanı</h2>
    </a>
    
    <a href="tahmin.html" class="card">
        <h2>🎲 Oyun Merkezi</h2>
    </a>

</body>
</html>
