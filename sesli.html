<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf'un Sesli Asistanı</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #6366f1; color: white; border: none; border-radius: 10px; margin: 10px; transition: 0.3s; }
        button:hover { background: #4f46e5; }
        #durum { margin-top: 20px; font-style: italic; color: #94a3b8; }
        #cevap { margin-top: 20px; font-size: 20px; color: #fbbf24; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sesli Asistan</h1>
        <button onclick="dinlemeyiBaslat()">🎤 Konuşmaya Başla</button>
        <p id="durum">Butona bas ve bir soru sor (örn: "Fatih kimdir?")</p>
        <div id="cevap"></div>
    </div>

    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'tr-TR';

        function dinlemeyiBaslat() {
            recognition.start();
            document.getElementById('durum').innerText = "Dinliyorum...";
        }

        recognition.onresult = function(event) {
            let sesliGirdi = event.results[0][0].transcript.toLowerCase();
            document.getElementById('durum').innerText = "Sen: " + sesliGirdi;
            asistanCevapla(sesliGirdi);
        };

        function asistanCevapla(text) {
            let cevap = "Bunu henüz bilmiyorum.";
            if(text.includes("fatih")) { cevap = "Fatih Sultan Mehmet, İstanbul'u fetheden büyük bir Osmanlı padişahıdır."; }
            else if(text.includes("merhaba")) { cevap = "Merhaba Yusuf, sana nasıl yardımcı olabilirim?"; }
            else if(text.includes("nasılsın")) { cevap = "Harikayım, sistemlerim tıkır tıkır çalışıyor!"; }

            document.getElementById('cevap').innerText = "Asistan: " + cevap;
            
            // Sesli okuma kısmı
            let konusma = new SpeechSynthesisUtterance(cevap);
            konusma.lang = 'tr-TR';
            window.speechSynthesis.speak(konusma);
        }
    </script>
</body>
</html>
