<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Araba Yarışı</title>
    <style>
        body { background: #333; text-align: center; color: white; }
        #yol { width: 300px; height: 500px; background: gray; margin: 20px auto; position: relative; overflow: hidden; border: 5px solid white; }
        #araba { width: 50px; height: 80px; background: blue; position: absolute; bottom: 20px; left: 125px; }
        #engel { width: 50px; height: 50px; background: red; position: absolute; top: -50px; left: 125px; }
    </style>
</head>
<body>
    <h1>Araba Yarışı</h1>
    <div id="yol">
        <div id="araba"></div>
        <div id="engel"></div>
    </div>
    <p>Engellere çarpma!</p>

    <script>
        let araba = document.getElementById('araba');
        let engel = document.getElementById('engel');
        let engelY = -50;

        // Araba kontrolü (klavye)
        document.onkeydown = (e) => {
            let left = parseInt(araba.style.left);
            if (e.key === "ArrowLeft" && left > 0) araba.style.left = (left - 20) + "px";
            if (e.key === "ArrowRight" && left < 250) araba.style.left = (left + 20) + "px";
        };

        // Engel hareketi
        setInterval(() => {
            engelY += 10;
            if (engelY > 500) { engelY = -50; engel.style.left = (Math.random() * 250) + "px"; }
            engel.style.top = engelY + "px";
        }, 50);
    </script>
</body>
</html>
