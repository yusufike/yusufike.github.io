<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sayı Tahmin & Yarış</title>
    <style>
        #yol { width: 400px; height: 50px; background: #555; position: relative; margin-bottom: 20px; }
        #araba { width: 50px; height: 50px; background: red; position: absolute; left: 0; transition: 0.5s; }
    </style>
</head>
<body>
    <h1>Sayı Tahmin Ettikçe Araba İlerler!</h1>
    <div id="yol"><div id="araba"></div></div>
    
    <input type="number" id="tahmin" placeholder="1-100 arası">
    <button onclick="oyna()">Tahmin Et</button>
    <p id="mesaj"></p>

    <script>
        let hedefSayi = Math.floor(Math.random() * 100) + 1;
        let konum = 0;

        function oyna() {
            let tahmin = document.getElementById('tahmin').value;
            let araba = document.getElementById('araba');
            let mesaj = document.getElementById('mesaj');

            if (tahmin == hedefSayi) {
                konum += 50;
                araba.style.left = konum + "px";
                mesaj.innerText = "Doğru! Araba hızlandı ve ilerledi!";
                hedefSayi = Math.floor(Math.random() * 100) + 1; // Yeni sayı
            } else {
                mesaj.innerText = "Yanlış! Tekrar dene.";
            }
        }
    </script>
</body>
</html>
