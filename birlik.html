<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tarih ve Kahramanlar Ansiklopedisi</title>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
        .menu { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px 20px; cursor: pointer; background: #4f46e5; color: white; border: none; border-radius: 8px; }
        #detayAlani { background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #4f46e5; }
        h3 { color: #818cf8; }
    </style>
</head>
<body>

    <h2>Tarih ve Kültür Bilgi Bankası</h2>
    <div class="menu">
        <button onclick="goster('kahramanlar')">🏆 Kahramanlar</button>
        <button onclick="goster('savaslar')">⚔️ Savaşlar</button>
        <button onclick="goster('padisahlar')">👑 Padişahlar</button>
    </div>

    <div id="detayAlani">Kategori seçerek detaylı bilgilere ulaşabilirsin.</div>

    <script>
        function goster(kategori) {
            let alan = document.getElementById('detayAlani');
            if(kategori == 'kahramanlar') {
                alan.innerHTML = "<h3>🏆 Kahramanlar ve Hayat Hikayeleri</h3>" +
                    "<p><b>Alparslan:</b> Selçuklu Sultanı, 1071 Malazgirt Zaferi'nin mimarıdır. Anadolu'yu Türk yurdu yapmıştır.</p>" +
                    "<p><b>Seyit Onbaşı:</b> Çanakkale Savaşları'nda 215 kg'lık mermiyi tek başına topa süren efsanevi kahramandır.</p>";
            } else if(kategori == 'savaslar') {
                alan.innerHTML = "<h3>⚔️ Savaşlar ve Nedenleri</h3>" +
                    "<p><b>Malazgirt Savaşı:</b> Bizans'ın Anadolu'daki Türk ilerleyişini durdurma isteğiyle başladı, zaferle sonuçlandı.</p>" +
                    "<p><b>Çanakkale Savaşı:</b> İtilaf devletlerinin İstanbul'u işgal etme çabasına karşı vatanın savunulmasıdır.</p>";
            } else if(kategori == 'padisahlar') {
                alan.innerHTML = "<h3>👑 Padişahlar ve Önemleri</h3>" +
                    "<p><b>Fatih Sultan Mehmet:</b> İstanbul'u fethederek bir çağı kapatıp bir çağı açmıştır.</p>" +
                    "<p><b>Kanuni Sultan Süleyman:</b> Osmanlı'nın en geniş sınırlarına ulaştığı ve hukuk reformlarının yapıldığı dönemdir.</p>";
            }
        }
    </script>
</body>
</html>
