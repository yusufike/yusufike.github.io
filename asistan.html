<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf'un Asistanı</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .back-btn { position: absolute; top: 15px; left: 15px; color: #8ab4f8; text-decoration: none; font-size: 16px; }
        h1 { font-weight: 300; margin-bottom: 30px; }
        .input-container { background: #1a1a1a; border-radius: 30px; padding: 20px; width: 80%; max-width: 400px; display: flex; align-items: center; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; text-align: center; font-size: 18px; }
        #cevap { margin-top: 30px; font-size: 20px; color: #8ab4f8; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Geri</a>

    <h1 id="karsilama">Ne sormak istersin, Yusuf?</h1>
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Matematik sorusu sor..." onkeypress="handleEnter(event)">
    </div>
    <div id="cevap"></div>

    <script>
        let isim = localStorage.getItem('kullaniciIsmi') || "Yusuf";
        
        function handleEnter(e) {
            if (e.key === 'Enter') {
                let giris = document.getElementById('userInput').value.toLowerCase();
                let cevapDiv = document.getElementById('cevap');
                let sonuc;

                if (giris.includes("+")) {
                    let s = giris.split("+");
                    sonuc = parseFloat(s[0]) + parseFloat(s[1]);
                    cevapDiv.innerText = "Cevabı buldum: " + sonuc + ". Başka sorun var mı " + isim + "?";
                } else if (giris.includes("*")) {
                    let s = giris.split("*");
                    sonuc = parseFloat(s[0]) * parseFloat(s[1]);
                    cevapDiv.innerText = "Cevabı buldum: " + sonuc + ". Başka sorun var mı " + isim + "?";
                } else {
                    cevapDiv.innerText = "Bunu henüz bilmiyorum.";
                }
            }
        }
    </script>
</body>
</html>
