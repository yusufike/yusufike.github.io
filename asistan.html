<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf Asistan</title>
</head>
<body>
    <h2>Yusuf AI</h2>
    <input type="text" id="input" placeholder="Soru sor...">
    <button onclick="calistir()">Gönder</button>
    <div id="cevap"></div>
    <script>
        async function calistir() {
            let input = document.getElementById('input').value;
            let cevap = document.getElementById('cevap');
            cevap.innerText = "Bekle, istek gönderiliyor...";
            // Buradaki proxy adresi tarayıcı engellerini aşmanı sağlar
            let url = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AQ.Ab8RN6Iy5ksk2M0LgfFVGdrp14Aw4RGFerNWw4QUzHtNwJYn8A");
            try {
                let response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                let data = await response.json();
                cevap.innerText = "Başarılı! Bağlantı kuruldu, kod çalışıyor.";
            } catch (e) {
                cevap.innerText = "Hata: " + e.message;
            }
        }
    </script>
</body>
</html>
