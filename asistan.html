<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf Asistan</title>
</head>
<body>
    <h2>Yusuf AI</h2>
    <input type="text" id="input" placeholder="Soru sor...">
    <button onclick="calistir()">Gönder</button>
    <div id="cevap"></div>
    <script>
        async function calistir() {
            const API_KEY = "AQ.Ab8RN6Iy5ksk2M0LgfFVGdrp14Aw4RGFerNWw4QUzHtNwJYn8A";
            let input = document.getElementById('input').value;
            let cevap = document.getElementById('cevap');
            cevap.innerText = "Bekle, istek gönderiliyor...";  
            // Proxy ile Google'a bağlanıyoruz
            let targetUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;
            let url = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);
            try {
                let response = await fetch(targetUrl, { // Proxy bazen POST isteklerini bozduğu için doğrudan burayı deniyoruz
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                let data = await response.json();
                if(data.candidates) {
                    cevap.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    cevap.innerText = "Hata oluştu: " + JSON.stringify(data);
                }
            } catch (e) {
                cevap.innerText = "Bağlantı Hatası: " + e.message;
            }
        }
    </script>
</body>
</html>
