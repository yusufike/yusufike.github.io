<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yusuf'un Asistanı</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        #cevap { margin-top: 20px; color: #4caf50; font-size: 1.2em; }
    </style>
</head>
<body>
    <h2>Yapay Zeka Asistanın</h2>
    <input type="text" id="userInput" placeholder="Bana bir şey sor..." onkeypress="handleEnter(event)">
    <div id="cevap"></div>

    <script>
        function handleEnter(e) {
            if (e.key === 'Enter') {
                let giris = document.getElementById('userInput').value.toLowerCase();
                let cevapDiv = document.getElementById('cevap');
                let cevap = "";

                // Saf sohbet mantığı - Matematik içermez!
                if (giris.includes("merhaba") || giris.includes("selam")) {
                    cevap = "Selam Yusuf! Bugün projelerin için neler yapabiliriz?";
                } else if (giris.includes("nasılsın")) {
                    cevap = "Harikayım! Seninle yeni kodlar üzerinde çalışmak çok keyifli.";
                } else if (giris.includes("oyun")) {
                    cevap = "Oyun dünyan gelişiyor! Yarış veya tahmin oyununu geliştirmeye ne dersin?";
                } else if (giris.includes("kod")) {
                    cevap = "Kodlama, dünyayı yeniden inşa etmek gibidir. Hangi kısım kafanı karıştırıyor?";
                } else {
                    cevap = "Bu konuyu henüz bilmiyorum ama seninle sohbet etmeye bayılırım. Başka nelerden konuşalım?";
                }

                cevapDiv.innerText = "Asistan: " + cevap;
                document.getElementById('userInput').value = "";
            }
        }
    </script>
</body>
</html>
