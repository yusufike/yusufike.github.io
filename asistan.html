<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusuf | Gelişmiş Asistan</title>
    <style>
        :root { --bg: #0a0a0c; --glass: rgba(255, 255, 255, 0.08); --primary: #6366f1; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }
        .panel { background: var(--glass); backdrop-filter: blur(20px); padding: 30px; border-radius: 25px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { margin-top: 0; color: var(--primary); }
        #asistanCevap { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-bottom: 20px; min-height: 80px; line-height: 1.6; border-left: 4px solid var(--primary); }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .modul-btn { background: #333; color: #fff; text-decoration: none; display: block; padding: 10px; text-align: center; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>🤖 Yusuf AI</h2>
    <div id="asistanCevap">Selam! Bugün ne hakkında konuşalım?</div>
    <input type="text" id="asistanInput" placeholder="Soru sor...">
    <button class="btn" onclick="cevapVer()">Sistemi Çalıştır</button>
    
    <div style="margin-top: 20px;">
        <a href="matematik.html" class="modul-btn">Matematik Modülü</a>
        <a href="cografya.html" class="modul-btn">Coğrafya Modülü</a>
    </div>
</div>

<script>
    async function cevapVer() {
        const API_KEY = "AQ.Ab8RN6JD6VVg4WCi7fk8nz2mrMjn53iVktNv5gTSJizIU-rFRg"; 
        let input = document.getElementById('asistanInput').value;
        let cevapAlani = document.getElementById('asistanCevap');
        if(!input) return;
        cevapAlani.innerText = "Yapay zeka analiz ediyor... 🧠";
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
            });
            const data = await response.json();
            const aiCevap = data.candidates[0].content.parts[0].text;
            cevapAlani.innerText = aiCevap;
            let msg = new SpeechSynthesisUtterance(aiCevap);
            msg.lang = 'tr-TR';
            window.speechSynthesis.speak(msg);
        } catch (error) {
            cevapAlani.innerText = "Sistem hatası oluştu!";
        }
    }
</script>
</body>
</html>
