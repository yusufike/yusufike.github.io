<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yusuf AI</title>
<style>
body{background:#0a0a0c;color:#fff;font-family:sans-serif;padding:20px;}
.panel{background:#1a1a1a;padding:20px;border-radius:15px;max-width:400px;margin:auto;}
input,button{width:100%;padding:10px;margin:5px 0;}
</style>
</head>
<body>
<div class="panel">
<div id="cevap">Merhaba!</div>
<input type="text" id="girdi">
<button onclick="sor()">Gönder</button>
</div>
<script>
async function sor() {
const key = "AQ.Ab8RN6JD6VVg4WCi7fk8nz2mrMjn53iVktNv5gTSJizIU-rFRg";
const txt = document.getElementById('girdi').value;
const div = document.getElementById('cevap');
div.innerText = "Yükleniyor...";
const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + key;
const res = await fetch(url, {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({contents: [{parts: [{text: txt}]}]})
});
const data = await res.json();
const msg = data.candidates[0].content.parts[0].text;
div.innerText = msg;
window.speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
}
</script>
</body>
</html>
